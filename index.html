<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARTOLA BIGATTOS</title>

<!-- DEPENDÊNCIAS (CORRETAS) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root {
  --bg:#0a0a0a;
  --panel:#141414;
  --accent:#ff6a00;
  --blue:#00c2ff;
  --green:#00e676;
  --red:#ff5252;
  --yellow:#ffc400;
  --text:#ffffff;
}

* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
}

header {
  background: #000;
  padding: 14px;
  border-bottom: 3px solid var(--accent);
}

.header-top {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.header-top h1 {
  margin: 0;
  color: var(--accent);
}

select, input {
  background: #000;
  color: #fff;
  border: 1px solid var(--accent);
  padding: 6px 10px;
  border-radius: 6px;
}

.kpis {
  margin-top: 12px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}

.kpi {
  background: var(--panel);
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  font-size: 12px;
}

.kpi strong {
  display: block;
  margin-top: 4px;
  font-size: 14px;
  color: var(--accent);
}

.container {
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

@media (max-width: 900px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 600px) {
  .container { grid-template-columns: 1fr; }
  .kpis { grid-template-columns: 1fr; }
}

.card {
  background: var(--panel);
  padding: 12px;
  border-radius: 10px;
}

h2 {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--accent);
}

canvas {
  width: 100%;
}
</style>
</head>

<body>

<header>
  <div class="header-top">
    <h1>⚽ CARTOLA BIGATTOS</h1>
    <div>
      Rodada:
      <select id="rodadaSelect"></select>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi">🏆 Líder<strong id="kpiLider">-</strong></div>
    <div class="kpi">🧊 Lanterna<strong id="kpiLanterna">-</strong></div>
    <div class="kpi">🍺 Maior Pagador<strong id="kpiPagador">-</strong></div>
    <div class="kpi">💰 Valor Arrecadado<strong id="kpiValor">R$ 0,00</strong></div>
    <div class="kpi">🍻 Total em Litros<strong id="kpiLitros">0 L</strong></div>
  </div>
</header>

<div class="container">

  <div class="card"><h2>📊 Pontuadores da Rodada</h2><canvas id="g1"></canvas></div>
  <div class="card"><h2>🍺 Pagadores da Rodada</h2><canvas id="g2"></canvas></div>
  <div class="card"><h2>📈 Total de Pontos</h2><canvas id="g3"></canvas></div>
  <div class="card"><h2>🍻 Total de Cervejas</h2><canvas id="g4"></canvas></div>

  <div class="card">
    <h2>📤 Upload cartola.xlsx</h2>
    <input type="file" id="fileInput" accept=".xlsx">
  </div>

</div>

<script>
Chart.register(ChartDataLabels);

let charts = [];
let pontos = [];
let cervejas = [];
let jogadores = [];

function destruirGraficos() {
  charts.forEach(c => c.destroy());
  charts = [];
}

function criarGrafico(id, labels, data, color) {
  const isMobile = window.innerWidth <= 600;
  const canvas = document.getElementById(id);

  canvas.parentNode.style.height = isMobile
    ? `${labels.length * 28}px`
    : '300px';

  const chart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: color,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: isMobile ? 'y' : 'x',
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: isMobile ? 'right' : 'top',
          clamp: true,
          clip: false,
          color: '#fff',
          font: { size: isMobile ? 10 : 9, weight: 600 },
          formatter: v => Number.isInteger(v) ? v : v.toFixed(2)
        }
      },
      scales: {
        x: { beginAtZero: true, ticks: { color: '#fff' } },
        y: {
          ticks: {
            color: '#fff',
            autoSkip: false,
            maxTicksLimit: labels.length
          }
        }
      }
    }
  });

  charts.push(chart);
}

document.getElementById("fileInput").addEventListener("change", e => {
  const reader = new FileReader();
  reader.onload = ev => {
    const wb = XLSX.read(ev.target.result, { type: "binary" });

    pontos = XLSX.utils.sheet_to_json(wb.Sheets["TB_PONTOS_C_CAPITA_PIVOT"]);
    cervejas = XLSX.utils.sheet_to_json(wb.Sheets["TB_PAGADOR_C_CAPITA_PIVOT"]);

    jogadores = [...new Set(pontos.map(p => p.Jogador))];
    const rodadas = [...new Set(pontos.map(p => p.Rodadas_Pontos))];

    const select = document.getElementById("rodadaSelect");
    select.innerHTML = rodadas.map(r => `<option>${r}</option>`).join("");
    select.value = rodadas.at(-1);

    atualizar();
  };
  reader.readAsBinaryString(e.target.files[0]);
});

document.getElementById("rodadaSelect").addEventListener("change", atualizar);

function atualizar() {
  destruirGraficos();
  const rodada = document.getElementById("rodadaSelect").value;

  const pontosRodada = jogadores.map(j =>
    pontos.find(p => p.Jogador === j && p.Rodadas_Pontos === rodada)?.Pontos || 0
  );

  const cervejaRodada = jogadores.map(j =>
    cervejas.find(c => c.Jogador === j && c.Rodadas_Cerveja === rodada)?.Cerveja || 0
  );

  criarGrafico("g1", jogadores, pontosRodada, "#00c2ff");
  criarGrafico("g2", jogadores, cervejaRodada, "#ffc400");
  criarGrafico(
    "g3",
    jogadores,
    jogadores.map(j => pontos.filter(p => p.Jogador === j).reduce((s,p)=>s+p.Pontos,0)),
    "#00e676"
  );
  criarGrafico(
    "g4",
    jogadores,
    jogadores.map(j => cervejas.filter(c => c.Jogador === j).reduce((s,c)=>s+c.Cerveja,0)),
    "#ff6a00"
  );

  const ranking = jogadores.map((j,i)=>({j,p:pontosRodada[i]})).sort((a,b)=>b.p-a.p);
  const totalC = cervejas.reduce((s,c)=>s+(c.Cerveja||0),0);

  document.getElementById("kpiLider").innerText = ranking[0].j;
  document.getElementById("kpiLanterna").innerText = ranking.at(-1).j;
  document.getElementById("kpiValor").innerText = `R$ ${(totalC*5).toFixed(2)}`;
  document.getElementById("kpiLitros").innerText = `${((totalC*600)/1000).toFixed(1)} L`;

  const maiorPagador = jogadores
    .map(j => ({ j, t: cervejas.filter(c => c.Jogador === j).reduce((s,c)=>s+c.Cerveja,0) }))
    .sort((a,b)=>b.t-a.t)[0];

  document.getElementById("kpiPagador").innerText = maiorPagador.j;
}
</script>

</body>
</html>
