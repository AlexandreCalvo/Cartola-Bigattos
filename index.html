<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cartola - Liga Bigattos</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    canvas {
      max-width: 100%;
      margin: 40px 0;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>Liga Bigattos - Análises Cartola</h1>

<h2>1️⃣ Pontuação dos Times por Rodada</h2>
<canvas id="chartPorRodada"></canvas>

<h2>2️⃣ Soma Total de Pontos (Todas as Rodadas)</h2>
<canvas id="chartTotal"></canvas>

<h2>3️⃣ 5 Piores Colocados por Rodada</h2>
<canvas id="chartPioresRodada"></canvas>

<h2>4️⃣ Soma dos 5 Piores Colocados (Todas as Rodadas)</h2>
<canvas id="chartPioresTotal"></canvas>


<script>
const TIMES = [
  24433, 95668, 97725, 873902, 1398130,
  3399644, 5537940, 5540469, 8088855,
  8163497, 8605337, 9073789, 19849595,
  26085113, 50194598
];

const PROXY = "https://corsproxy.io/?";
const BASE_URL = "https://api.cartola.globo.com/time/id";

async function fetchTime(timeId, rodada) {
  const url = `${PROXY}${BASE_URL}/${timeId}/${rodada}`;
  const res = await fetch(url);
  return await res.json();
}

async function carregarDados() {
  // Descobrir rodada atual
  const temp = await fetchTime(TIMES[0], 1);
  const rodadaAtual = temp.rodada_atual;

  let dadosPorRodada = {};
  let somaTotal = {};
  let nomesTimes = {};

  for (let rodada = 1; rodada <= rodadaAtual; rodada++) {
    dadosPorRodada[rodada] = [];

    for (let timeId of TIMES) {
      const data = await fetchTime(timeId, rodada);

      const pontos = data.pontos || 0;
      const nome = data.time.nome;

      nomesTimes[timeId] = nome;

      if (!somaTotal[timeId]) somaTotal[timeId] = 0;
      somaTotal[timeId] += pontos;

      dadosPorRodada[rodada].push({
        timeId,
        nome,
        pontos
      });
    }
  }

  gerarGraficos(dadosPorRodada, somaTotal, nomesTimes);
}

function gerarGraficos(dadosPorRodada, somaTotal, nomesTimes) {

  // 1 - Pontuadores por rodada (última rodada)
  const ultimaRodada = Object.keys(dadosPorRodada).slice(-1)[0];
  const rodadaData = dadosPorRodada[ultimaRodada];

  new Chart(document.getElementById("chartPorRodada"), {
    type: "bar",
    data: {
      labels: rodadaData.map(t => t.nome),
      datasets: [{
        label: `Rodada ${ultimaRodada}`,
        data: rodadaData.map(t => t.pontos),
        backgroundColor: "rgba(54, 162, 235, 0.7)"
      }]
    }
  });

  // 2 - Soma total
  new Chart(document.getElementById("chartTotal"), {
    type: "bar",
    data: {
      labels: Object.keys(nomesTimes).map(id => nomesTimes[id]),
      datasets: [{
        label: "Total de Pontos",
        data: Object.keys(somaTotal).map(id => somaTotal[id]),
        backgroundColor: "rgba(75, 192, 192, 0.7)"
      }]
    }
  });

  // 3 - 5 piores por rodada (última rodada)
  const pioresRodada = [...rodadaData]
    .sort((a, b) => a.pontos - b.pontos)
    .slice(0, 5);

  new Chart(document.getElementById("chartPioresRodada"), {
    type: "bar",
    data: {
      labels: pioresRodada.map(t => t.nome),
      datasets: [{
        label: "5 Piores da Rodada",
        data: pioresRodada.map(t => t.pontos),
        backgroundColor: "rgba(255, 99, 132, 0.7)"
      }]
    }
  });

  // 4 - Soma dos 5 piores no geral
  const pioresTotal = Object.keys(somaTotal)
    .map(id => ({ nome: nomesTimes[id], pontos: somaTotal[id] }))
    .sort((a, b) => a.pontos - b.pontos)
    .slice(0, 5);

  new Chart(document.getElementById("chartPioresTotal"), {
    type: "bar",
    data: {
      labels: pioresTotal.map(t => t.nome),
      datasets: [{
        label: "5 Piores no Total",
        data: pioresTotal.map(t => t.pontos),
        backgroundColor: "rgba(153, 102, 255, 0.7)"
      }]
    }
  });

}

carregarDados();
</script>

</body>
</html>
``
