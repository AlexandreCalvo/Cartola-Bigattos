<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARTOLA BIGATTOS</title>

<!-- ✅ DEPENDÊNCIAS (FORMA CORRETA) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #fff;
  font-family: Arial, sans-serif;
}
header {
  background: #000;
  padding: 12px;
  border-bottom: 3px solid #ff6a00;
}
h1 { margin: 0; }
select, input {
  background: #000;
  color: #fff;
  border: 1px solid #ff6a00;
  padding: 6px;
  border-radius: 6px;
}
.kpis {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.kpi {
  background: #141414;
  padding: 8px;
  border-radius: 8px;
  text-align: center;
  font-size: 12px;
}
.kpi strong {
  display: block;
  margin-top: 4px;
  color: #ff6a00;
}
.container {
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
@media (max-width: 600px) {
  .container { grid-template-columns: 1fr; }
  .kpis { grid-template-columns: 1fr; }
}
.card {
  background: #141414;
  padding: 12px;
  border-radius: 10px;
}
h2 { color: #ff6a00; font-size: 14px; }
canvas { max-height: 280px; }
</style>
</head>

<body>

<header>
  <h1>⚽ CARTOLA BIGATTOS</h1>
  Rodada:
  <select id="rodada"></select>

  <div class="kpis">
    <div class="kpi">🏆 Líder<strong id="kpiLider">-</strong></div>
    <div class="kpi">🧊 Lanterna<strong id="kpiLanterna">-</strong></div>
    <div class="kpi">🍺 Maior Pagador<strong id="kpiPagador">-</strong></div>
    <div class="kpi">💰 Valor<strong id="kpiValor">R$ 0</strong></div>
    <div class="kpi">🍻 Litros<strong id="kpiLitros">0 L</strong></div>
  </div>
</header>

<div class="container">

  <div class="card"><h2>Pontos da Rodada</h2><canvas id="g1"></canvas></div>
  <div class="card"><h2>Cerveja da Rodada</h2><canvas id="g2"></canvas></div>
  <div class="card"><h2>Total de Pontos</h2><canvas id="g3"></canvas></div>
  <div class="card"><h2>Total de Cerveja</h2><canvas id="g4"></canvas></div>

  <div class="card">
    <h2>Upload cartola.xlsx</h2>
    <input type="file" id="file" accept=".xlsx">
  </div>

</div>

<script>
Chart.register(ChartDataLabels);

let charts=[], pontos=[], cervejas=[], jogadores=[];

function limpar() {
  charts.forEach(c => c.destroy());
  charts = [];
}

function grafico(id, labels, data, color) {
  const isMobile = window.innerWidth <= 600;
  const canvas = document.getElementById(id);

  // ✅ Altura real suficiente para TODOS os nomes
  canvas.parentNode.style.height = isMobile
    ? `${labels.length * 28}px`
    : '300px';

  const c = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        data: data,
        backgroundColor: color,
        borderRadius: 6
      }]
    },
    plugins: [ChartDataLabels],
    options: {
      responsive: true,
      maintainAspectRatio: false,

      // ✅ Barra horizontal no mobile
      indexAxis: isMobile ? 'y' : 'x',

      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: isMobile ? 'right' : 'top',
          clamp: true,
          clip: false,
          color: '#ffffff',
          font: {
            size: isMobile ? 10 : 9,
            weight: 600
          },
          formatter: v => Number.isInteger(v) ? v : v.toFixed(2)
        }
      },

      scales: {
        x: {
          beginAtZero: true,
          ticks: { color: '#ffffff' }
        },
        y: {
          ticks: {
            color: '#ffffff',

            // ✅ ESTES DOIS JUNTOS SÃO O SEGREDO
            autoSkip: false,
            maxTicksLimit: labels.length
          }
        }
      }
    }
  });

  charts.push(c);
}

file.onchange = e => {
  const reader = new FileReader();
  reader.onload = ev => {
    const wb = XLSX.read(ev.target.result, { type: 'binary' });

    pontos   = XLSX.utils.sheet_to_json(wb.Sheets['TB_PONTOS_C_CAPITA_PIVOT']);
    cervejas= XLSX.utils.sheet_to_json(wb.Sheets['TB_PAGADOR_C_CAPITA_PIVOT']);

    jogadores = [...new Set(pontos.map(p => p.Jogador))];
    const rodadas = [...new Set(pontos.map(p => p.Rodadas_Pontos))];

    rodada.innerHTML = rodadas.map(r => `<option>${r}</option>`).join('');
    rodada.value = rodadas.at(-1);

    atualizar();
  };
  reader.readAsBinaryString(e.target.files[0]);
};

rodada.onchange = atualizar;

function atualizar() {
  limpar();
  const r = rodada.value;

  const pontosRod = jogadores.map(j =>
    pontos.find(p => p.Jogador === j && p.Rodadas_Pontos === r)?.Pontos || 0
  );

  const cervejaRod = jogadores.map(j =>
    cervejas.find(c => c.Jogador === j && c.Rodadas_Cerveja === r)?.Cerveja || 0
  );

  grafico('g1', jogadores, pontosRod, '#00c2ff');
  grafico('g2', jogadores, cervejaRod, '#ffc400');
  grafico('g3', jogadores,
    jogadores.map(j => pontos.filter(p => p.Jogador === j).reduce((s,p)=>s+p.Pontos,0)),
    '#00e676'
  );
  grafico('g4', jogadores,
    jogadores.map(j => cervejas.filter(c => c.Jogador === j).reduce((s,c)=>s+c.Cerveja,0)),
    '#ff6a00'
  );

  const rank = jogadores.map((j,i)=>({j,p:pontosRod[i]})).sort((a,b)=>b.p-a.p);
  const totalC = cervejas.reduce((s,c)=>s+(c.Cerveja||0),0);

  kpiLider.innerText   = rank[0].j;
  kpiLanterna.innerText= rank.at(-1).j;
  kpiValor.innerText  = `R$ ${(totalC*5).toFixed(2)}`;
  kpiLitros.innerText = `${((totalC*600)/1000).toFixed(1)} L`;

  const pag = jogadores
    .map(j=>({j,t:cervejas.filter(c=>c.Jogador===j).reduce((s,c)=>s+c.Cerveja,0)}))
    .sort((a,b)=>b.t-a.t)[0];
  kpiPagador.innerText = pag.j;
}
</script>

</body>
</html>
