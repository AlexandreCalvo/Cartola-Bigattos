<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CARTOLA BIGATTOS</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- DataLabels -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root {
  --bg:#0a0a0a;
  --panel:#141414;
  --accent:#ff6a00;
  --blue:#00c2ff;
  --green:#00e676;
  --red:#ff5252;
  --yellow:#ffc400;
  --text:#ffffff;
  --muted:#9e9e9e;
}

*{box-sizing:border-box;font-family:'Segoe UI',Arial;}

body{margin:0;background:var(--bg);color:var(--text);}

header{background:#000;padding:16px;border-bottom:3px solid var(--accent);}

.header-content{
  display:flex;flex-direction:column;gap:12px;align-items:center;
}

.header-controls{
  display:flex;gap:10px;align-items:center;
}

select,input{
  background:#000;color:#fff;border:1px solid var(--accent);
  padding:6px 10px;border-radius:6px;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;width:100%;max-width:1200px;
}

.kpi{
  background:var(--panel);
  border-radius:10px;
  padding:12px;
  text-align:center;
  font-size:13px;
}

.kpi strong{
  display:block;font-size:16px;margin-top:4px;color:var(--accent);
}

.container{
  padding:16px;
  display:grid;
  gap:16px;
  grid-template-columns:repeat(2,1fr);
}

@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){
  .container{grid-template-columns:1fr;}
  .kpis{grid-template-columns:1fr;}
}

.card{
  background:var(--panel);
  border-radius:10px;
  padding:14px;
}

h2{font-size:14px;margin-bottom:8px;color:var(--accent);}
canvas{max-height:320px;}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <h1>⚽ CARTOLA BIGATTOS</h1>

    <div class="header-controls">
      <strong>Rodada:</strong>
      <select id="rodadaSelect">
        <option>Carregue o arquivo</option>
      </select>
    </div>

    <div class="kpis">
      <div class="kpi">🏆 Líder<strong id="kpiLider">–</strong></div>
      <div class="kpi">🧊 Lanterna<strong id="kpiLanterna">–</strong></div>
      <div class="kpi">🍺 Maior Pagador<strong id="kpiPagador">–</strong></div>
      <div class="kpi">💰 Valor Arrecadado<strong id="kpiValor">R$ 0,00</strong></div>
      <div class="kpi">🍻 Total em Litros<strong id="kpiLitros">0 L</strong></div>
    </div>
  </div>
</header>

<div class="container">

  <div class="card"><h2>📊 Pontuadores da Rodada</h2><canvas id="pontosRodada"></canvas></div>
  <div class="card"><h2>🍺 Pagadores da Rodada</h2><canvas id="cervejaRodada"></canvas></div>
  <div class="card"><h2>🏆 Top 5 Pontuadores</h2><canvas id="top5"></canvas></div>
  <div class="card"><h2>🧊 Flop 5 Pontuadores</h2><canvas id="flop5"></canvas></div>
  <div class="card"><h2>📈 Total de Pontos</h2><canvas id="totalPontos"></canvas></div>
  <div class="card"><h2>🍻 Total de Cervejas</h2><canvas id="totalCerveja"></canvas></div>

  <div class="card">
    <h2>📤 Upload cartola.xlsx</h2>
    <input type="file" id="fileInput" accept=".xlsx">
  </div>

</div>

<script>
let charts=[], pontos=[], cerveja=[], jogadores=[];

function destroyCharts(){charts.forEach(c=>c.destroy());charts=[];}

function createChart(id,labels,data,color){
  const c=new Chart(document.getElementById(id),{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:color,borderRadius:6}]},
    plugins:[ChartDataLabels],
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        datalabels:{
          anchor:'end',
          align:'top',
          color:'#fff',
          clamp:true,
          clip:false,
          font:{weight:'bold'},
          formatter:v=>Number.isInteger(v)?v:v.toFixed(2)
        }
      },
      scales:{
        y:{beginAtZero:true,grace:'10%',ticks:{color:'#fff'}},
        x:{ticks:{color:'#fff'}}
      }
    }
  });
  charts.push(c);
}

fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'binary'});
    pontos=XLSX.utils.sheet_to_json(wb.Sheets['TB_PONTOS_C_CAPITA_PIVOT']);
    cerveja=XLSX.utils.sheet_to_json(wb.Sheets['TB_PAGADOR_C_CAPITA_PIVOT']);
    jogadores=[...new Set(pontos.map(p=>p.Jogador))];

    const rodadas=[...new Set(pontos.map(p=>p.Rodadas_Pontos))];
    rodadaSelect.innerHTML=rodadas.map(r=>`<option>${r}</option>`).join('');
    rodadaSelect.value=rodadas[rodadas.length-1];
    update();
  };
  r.readAsBinaryString(e.target.files[0]);
};

rodadaSelect.onchange=update;

function update(){
  destroyCharts();
  const r=rodadaSelect.value;

  const pRod=jogadores.map(j=>pontos.find(p=>p.Jogador===j&&p.Rodadas_Pontos===r)?.Pontos||0);
  const cRod=jogadores.map(j=>cerveja.find(c=>c.Jogador===j&&c.Rodadas_Cerveja===r)?.Cerveja||0);

  const rank=jogadores.map((j,i)=>({j,p:pRod[i]})).sort((a,b)=>b.p-a.p);

  createChart('pontosRodada',jogadores,pRod,'#00c2ff');
  createChart('cervejaRodada',jogadores,cRod,'#ffc400');
  createChart('top5',rank.slice(0,5).map(x=>x.j),rank.slice(0,5).map(x=>x.p),'#00e676');
  createChart('flop5',rank.slice(-5).map(x=>x.j),rank.slice(-5).map(x=>x.p),'#ff5252');
  createChart('totalPontos',jogadores,
    jogadores.map(j=>pontos.filter(p=>p.Jogador===j).reduce((s,p)=>s+p.Pontos,0)),'#00c2ff');
  createChart('totalCerveja',jogadores,
    jogadores.map(j=>cerveja.filter(c=>c.Jogador===j).reduce((s,c)=>s+c.Cerveja,0)),'#ff6a00');

  document.getElementById('kpiLider').innerText=rank[0].j;
  document.getElementById('kpiLanterna').innerText=rank.at(-1).j;

  const totalCerv=jogadores.map(j=>cerveja.filter(c=>c.Jogador===j).reduce((s,c)=>s+c.Cerveja,0)).reduce((a,b)=>a+b,0);
  const pagador=jogadores.map(j=>({j,t:cerveja.filter(c=>c.Jogador===j).reduce((s,c)=>s+c.Cerveja,0)})).sort((a,b)=>b.t-a.t)[0];

  document.getElementById('kpiPagador').innerText=pagador.j;
  document.getElementById('kpiValor').innerText=`R$ ${(totalCerv*5).toFixed(2)}`;
  document.getElementById('kpiLitros').innerText=`${((totalCerv*600)/1000).toFixed(1)} L`;
}
</script>

</body>
</html>
``
